name: QA Automation Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  cucumber:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start QA Practice API container
        run: |
          docker rm -f qa-practice-api || true
          docker run -d --name qa-practice-api -p 8887:8081 rvancea/qa-practice-api:latest
          docker ps

      - name: Wait for QA Practice API
        run: |
          echo "Waiting for API container..."
          sleep 15

          for i in {1..45}; do
            echo "Attempt $i"

            if curl --silent --show-error http://localhost:8887/swagger-ui.html > /dev/null; then
              echo "Swagger is reachable"
              docker ps
              exit 0
            fi

            docker ps
            sleep 2
          done

          echo "API did not become ready"
          docker logs qa-practice-api
          exit 1

      - name: Smoke test API endpoint
        run: |
          curl --verbose http://localhost:8887/swagger-ui.html

      - name: Run Cucumber tests
        run: npm test

      - name: Generate HTML report
        if: always()
        run: npm run report

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: reports/cucumber-report.html
